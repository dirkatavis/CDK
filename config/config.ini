# CDK Path Configuration
# All file paths are relative to the repository root (where .cdkroot is located)
# Edit this file to change file locations without modifying scripts

[Open_RO]
CSV=apps\repair_order\0_Open_RO\Open_RO.csv
OutputCSV=apps\repair_order\0_Open_RO\Open_RO_out.csv
Log=apps\repair_order\0_Open_RO\Open_RO.log
DebugMarker=apps\repair_order\0_Open_RO\Open_RO.debug
FallbackLog=apps\repair_order\0_Open_RO\FALLBACK_ERROR.txt
# Log verbosity: Low | Med | High
# Low  = lifecycle milestones + parser-required MVA/RO success lines
# Med  = Low + warnings/timeouts/procedural decisions
# High = Med + detailed prompt/screen tracing
Verbosity=Med

[Prepare_Close_Pt1]
CSV=apps\repair_order\1_prepare_close_pt1\Prepare_Close_Pt1.csv
Log=apps\repair_order\1_prepare_close_pt1\Prepare_Close_Pt1.log
RoScreenLoadTimeoutMs=25000
RoScreenPollMs=1000

[Finalize_Close]
CSV=apps\repair_order\2_finalize_close_pt2\Finalize_Close.csv
Log=apps\repair_order\2_finalize_close_pt2\Finalize_Close.log

[PostFinalCharges]
CSV=apps\post_final_charges\CashoutRoList.csv
Log=apps\post_final_charges\PostFinalCharges.log
DiagnosticLog=apps\post_final_charges\PostFinalCharges.screendump.log
TriggerList=apps\post_final_charges\CloseoutTriggers.csv
StartSequenceNumber=430
EndSequenceNumber=500
ValidCloseoutStatuses=READY TO POST
CommonLib=apps\post_final_charges\CommonLib.vbs
SkipRoList=apps\post_final_charges\SkipRoList.csv
CloseoutConfirmDelayMs=1200
blacklist_terms=VEND TO DEALER
StabilityPause=1000
# Threshold in days for closing older ROs (0 = disabled)
OlderRoThresholdDays=30
# Comma-separated RO statuses eligible for age-based closeout
OlderRoStatuses=OPENED,OPEN,PREASSIGNED,PRE-ASSIGNED, READY TO POST
# Log verbosity for PostFinalCharges: low | med | high | max
# low  = lifecycle + per-RO outcomes + errors (default for production)
# med  = low + warnings/timeouts + skip/process decision context
# high = med + action trace (commands/prompts/screen transitions)
# max  = deep diagnostics and loop-level tracing (debug only)
log_verbosity=low
# Optional: overwrite PostFinalCharges.log at startup (true|false)
OverwriteLogOnStart=false
# FCA warranty dialog settings (WCH labor-type lines)
FcaConditionCode=1
FcaCausalLop=Y
FcaCalEmissions=N

[Maintenance_RO_Closer]
Log=apps\maintenance_ro_closer\Maintenance_RO_Closer.log
ROList=apps\maintenance_ro_closer\RO_List.csv
SkipRoList=apps\maintenance_ro_closer\SkipRoList.csv
StabilityPause=1000
LoopPause=500
ReviewPause=250
blacklist_terms=VEND TO DEALER
# Days old an RO must be to qualify for age exception (bypasses footprint check). 0 = disabled.
AssumeClosedAfterDays=30
# Employee credentials used for VEHID error recovery
EmployeeNumber=18351
EmployeeNameConfirm=CAMP|PASTEUR

[Processing]

[PFC_Scrapper]
# Relative path to the resulting data file
OutputCSV=apps\pfc_scrapper\PFC_Scraped_Data.csv
# Relative path to the execution log
Log=apps\pfc_scrapper\PFC_Scrapper.log
# Wait time in milliseconds between screen transitions (default 1000)
ScreenWaitDelay=1000
# Sequence number to start scraping from (default 1)
StartSequence=1
# Comma-separated list of sequence numbers to skip (e.g., 4,7,12)
SkipSequences=
# Employee credentials used for VEHID error recovery
EmployeeNumber=18351
EmployeeNameConfirm=CAMP|PASTEUR

[C94ReportAnalyzer]
InputCSV=apps\c94_report_analyzer\input.csv
OutputCSV=apps\c94_report_analyzer\formatted_ros.csv
Log=apps\c94_report_analyzer\C94ReportAnalyzer.log
ScreenWaitDelay=1000
EmployeeNumber=18351
EmployeeNameConfirm=CAMP|PASTEUR
# Comma-separated keywords to search for across all RO lines (case-insensitive, all pages).
# One output column per keyword. Empty = all keyword columns blank.
Keywords=VEND TO DEALER,WCH

[Pfc_Summary]
OutputCSV=apps\post_final_charges\Pfc_Summary_output.csv
Log=apps\post_final_charges\Pfc_Summary.log
StartSequenceNumber=10
EndSequenceNumber=300
StepDelayMs=500

[Fallback]
ErrorLog=runtime\logs\FALLBACK_ERROR.txt

[ValidateRoList]
# Input CSV containing R.O. numbers (required)
InputFile=apps\validate_ro_list\ValidateRoList_IN.csv
# Explicit output file (optional)
OutputFile=apps\validate_ro_list\ValidateRoList_OUT.txt
# Directory where output and mock log files will be written (required)
OutDir=apps\validate_ro_list
# Optional screen map file used for mock/scraping
ScreenMap=apps\validate_ro_list\ro_screen_map_pfc.txt

[Prescreened_RO_Closer]
InputCSV=apps\prescreened_ro_closer\Prescreened_RO_List.csv
Log=apps\prescreened_ro_closer\Prescreened_RO_Closer.log
StabilityPause=1000
LoopPause=500
ReviewPause=250
blacklist_terms=VEND TO DEALER,WCH

[Coordinate_Finder]
Log=runtime\logs\coordinate_finder\Coordinate_Finder.log
Output=runtime\logs\coordinate_finder\Coordinate_Finder.log

[GetMvaFromVin]
InputCSV=tools\mva_scrapper\GetMvaFromVin_input.csv
OutputCSV=tools\mva_scrapper\GetMvaFromVin_output.csv
Log=runtime\logs\GetMvaFromVin.log
DiagnosticLog=runtime\logs\GetMvaFromVin.screendump.log
VinColumn=VIN
VinPromptText=VIN
ResultsReadyText=MVA
NoResultText=NO VEHICLE FOUND
MvaLabelText=MVA
MvaRegex=MVA[: ]*([A-Z0-9\-]+)
SearchSubmitKey=<NumpadEnter>
ReturnToSearchKey=
CommandWaitSec=10
ResultsWaitSec=15
PollMs=300
CaptureScreenOnError=true
ContinueOnError=true
