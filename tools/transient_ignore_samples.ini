[samples]
# Likely transient artifacts (should classify as transient)
transient =
    session.log
    module.pyc
    debug_trace_report.txt

# Likely tracked files (should classify as non-transient)
tracked =
    settings.ini
    notes.txt
    automation.vbs

[allowlist]
# Optional regex patterns that force non-transient classification
patterns =
    reference_fixture\.log$

[expectations]
# Format: relative/path|expected-action
# Expected actions: ignore-in-repo-keep-local | track-file | add-allowlist-pattern | review-before-ignore
actions =
    session.log|ignore-in-repo-keep-local
    module.pyc|ignore-in-repo-keep-local
    debug_trace_report.txt|ignore-in-repo-keep-local
    settings.ini|track-file
    notes.txt|track-file
    automation.vbs|track-file
    
